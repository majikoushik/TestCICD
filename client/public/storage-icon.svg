<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="10" fill="#3f51b5" opacity="0.1"/>
  
  <!-- Storage Server Racks -->
  <g fill="#3f51b5">
    <!-- Server Rack 1 -->
    <rect x="30" y="25" width="60" height="15" rx="2"/>
    <rect x="35" y="30" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="45" y="30" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="80" y="30" width="5" height="5" rx="1" fill="#ffffff"/>
    
    <!-- Server Rack 2 -->
    <rect x="30" y="45" width="60" height="15" rx="2"/>
    <rect x="35" y="50" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="45" y="50" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="80" y="50" width="5" height="5" rx="1" fill="#ffffff"/>
    
    <!-- Server Rack 3 -->
    <rect x="30" y="65" width="60" height="15" rx="2"/>
    <rect x="35" y="70" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="45" y="70" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="80" y="70" width="5" height="5" rx="1" fill="#ffffff"/>
    
    <!-- Server Rack 4 -->
    <rect x="30" y="85" width="60" height="15" rx="2"/>
    <rect x="35" y="90" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="45" y="90" width="5" height="5" rx="1" fill="#ffffff"/>
    <rect x="80" y="90" width="5" height="5" rx="1" fill="#ffffff"/>
  </g>
  
  <!-- Blockchain Connection Lines -->
  <g stroke="#3f51b5" stroke-width="1.5" opacity="0.7">
    <line x1="20" y1="32.5" x2="30" y2="32.5"/>
    <line x1="20" y1="52.5" x2="30" y2="52.5"/>
    <line x1="20" y1="72.5" x2="30" y2="72.5"/>
    <line x1="20" y1="92.5" x2="30" y2="92.5"/>
    
    <line x1="90" y1="32.5" x2="100" y2="32.5"/>
    <line x1="90" y1="52.5" x2="100" y2="52.5"/>
    <line x1="90" y1="72.5" x2="100" y2="72.5"/>
    <line x1="90" y1="92.5" x2="100" y2="92.5"/>
    
    <line x1="20" y1="32.5" x2="20" y2="92.5"/>
    <line x1="100" y1="32.5" x2="100" y2="92.5"/>
  </g>
  
  <!-- Data Symbols -->
  <g fill="#3f51b5" font-family="monospace" font-size="8" font-weight="bold">
    <text x="58" y="35" text-anchor="middle">DATA</text>
    <text x="58" y="55" text-anchor="middle">SECURE</text>
    <text x="58" y="75" text-anchor="middle">BLOCK</text>
    <text x="58" y="95" text-anchor="middle">CHAIN</text>
  </g>
  
  <!-- Lock Symbol -->
  <g fill="#3f51b5">
    <rect x="55" y="10" width="10" height="8" rx="2"/>
    <path d="M53,10 L53,8 C53,4 67,4 67,8 L67,10" stroke="#3f51b5" stroke-width="2" fill="none"/>
  </g>
</svg>
