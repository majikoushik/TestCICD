<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Circle -->
  <circle cx="100" cy="100" r="90" fill="#3f51b5" opacity="0.9"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="70" fill="#ffffff" opacity="0.9"/>
  
  <!-- Blockchain Pattern -->
  <g stroke="#3f51b5" stroke-width="3" fill="none">
    <path d="M70,70 L130,70 L130,130 L70,130 Z" />
    <path d="M85,85 L115,85 L115,115 L85,115 Z" />
    <line x1="70" y1="70" x2="85" y2="85" />
    <line x1="130" y1="70" x2="115" y2="85" />
    <line x1="70" y1="130" x2="85" y2="115" />
    <line x1="130" y1="130" x2="115" y2="115" />
  </g>
  
  <!-- Medical Cross -->
  <g fill="#3f51b5">
    <rect x="95" y="60" width="10" height="80" rx="2" />
    <rect x="60" y="95" width="80" height="10" rx="2" />
  </g>
  
  <!-- AI Nodes -->
  <g fill="#3f51b5">
    <circle cx="60" cy="60" r="5" />
    <circle cx="140" cy="60" r="5" />
    <circle cx="60" cy="140" r="5" />
    <circle cx="140" cy="140" r="5" />
    <circle cx="100" cy="60" r="5" />
    <circle cx="100" cy="140" r="5" />
    <circle cx="60" cy="100" r="5" />
    <circle cx="140" cy="100" r="5" />
  </g>
  
  <!-- Connecting Lines -->
  <g stroke="#3f51b5" stroke-width="1.5" opacity="0.6">
    <line x1="60" y1="60" x2="100" y2="60" />
    <line x1="100" y1="60" x2="140" y2="60" />
    <line x1="60" y1="140" x2="100" y2="140" />
    <line x1="100" y1="140" x2="140" y2="140" />
    <line x1="60" y1="60" x2="60" y2="100" />
    <line x1="60" y1="100" x2="60" y2="140" />
    <line x1="140" y1="60" x2="140" y2="100" />
    <line x1="140" y1="100" x2="140" y2="140" />
    <line x1="60" y1="60" x2="85" y2="85" />
    <line x1="140" y1="60" x2="115" y2="85" />
    <line x1="60" y1="140" x2="85" y2="115" />
    <line x1="140" y1="140" x2="115" y2="115" />
  </g>
</svg>
