<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="10" fill="#3f51b5" opacity="0.1"/>
  
  <!-- Analytics Chart -->
  <g fill="#3f51b5">
    <!-- Bar Chart -->
    <rect x="20" y="70" width="15" height="30" rx="2"/>
    <rect x="45" y="50" width="15" height="50" rx="2"/>
    <rect x="70" y="30" width="15" height="70" rx="2"/>
    <rect x="95" y="60" width="15" height="40" rx="2"/>
    
    <!-- Line Chart -->
    <path d="M20,40 L40,35 L60,25 L80,30 L100,20" 
          stroke="#3f51b5" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Data Points -->
    <circle cx="20" cy="40" r="4"/>
    <circle cx="40" cy="35" r="4"/>
    <circle cx="60" cy="25" r="4"/>
    <circle cx="80" cy="30" r="4"/>
    <circle cx="100" cy="20" r="4"/>
  </g>
  
  <!-- Base Line -->
  <line x1="10" y1="100" x2="110" y2="100" stroke="#3f51b5" stroke-width="2"/>
</svg>
