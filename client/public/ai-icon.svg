<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="10" fill="#3f51b5" opacity="0.1"/>
  
  <!-- Brain Outline -->
  <path d="M60,25 
           C40,25 25,40 25,55 
           C25,65 30,70 35,75
           C40,80 40,85 40,90
           L80,90
           C80,85 80,80 85,75
           C90,70 95,65 95,55
           C95,40 80,25 60,25 Z" 
        fill="#ffffff" 
        stroke="#3f51b5" 
        stroke-width="2"/>
  
  <!-- Neural Network Nodes -->
  <g fill="#3f51b5">
    <!-- Layer 1 -->
    <circle cx="40" cy="40" r="5"/>
    <circle cx="60" cy="35" r="5"/>
    <circle cx="80" cy="40" r="5"/>
    
    <!-- Layer 2 -->
    <circle cx="35" cy="60" r="5"/>
    <circle cx="60" cy="55" r="5"/>
    <circle cx="85" cy="60" r="5"/>
    
    <!-- Layer 3 -->
    <circle cx="45" cy="75" r="5"/>
    <circle cx="60" cy="70" r="5"/>
    <circle cx="75" cy="75" r="5"/>
    
    <!-- Output Layer -->
    <circle cx="60" cy="85" r="5"/>
  </g>
  
  <!-- Neural Connections -->
  <g stroke="#3f51b5" stroke-width="1.5" opacity="0.6">
    <!-- Layer 1 to 2 -->
    <line x1="40" y1="40" x2="35" y2="60"/>
    <line x1="40" y1="40" x2="60" y2="55"/>
    <line x1="60" y1="35" x2="35" y2="60"/>
    <line x1="60" y1="35" x2="60" y2="55"/>
    <line x1="60" y1="35" x2="85" y2="60"/>
    <line x1="80" y1="40" x2="60" y2="55"/>
    <line x1="80" y1="40" x2="85" y2="60"/>
    
    <!-- Layer 2 to 3 -->
    <line x1="35" y1="60" x2="45" y2="75"/>
    <line x1="35" y1="60" x2="60" y2="70"/>
    <line x1="60" y1="55" x2="45" y2="75"/>
    <line x1="60" y1="55" x2="60" y2="70"/>
    <line x1="60" y1="55" x2="75" y2="75"/>
    <line x1="85" y1="60" x2="60" y2="70"/>
    <line x1="85" y1="60" x2="75" y2="75"/>
    
    <!-- Layer 3 to Output -->
    <line x1="45" y1="75" x2="60" y2="85"/>
    <line x1="60" y1="70" x2="60" y2="85"/>
    <line x1="75" y1="75" x2="60" y2="85"/>
  </g>
  
  <!-- Pulse Animation Circles (static representation) -->
  <g fill="#3f51b5" opacity="0.3">
    <circle cx="40" cy="40" r="8"/>
    <circle cx="60" cy="55" r="8"/>
    <circle cx="75" cy="75" r="8"/>
  </g>
  
  <!-- Medical Symbol -->
  <g fill="#3f51b5">
    <rect x="57.5" cy="15" width="5" height="15" rx="1"/>
    <rect x="52.5" cy="20" width="15" height="5" rx="1"/>
  </g>
</svg>
