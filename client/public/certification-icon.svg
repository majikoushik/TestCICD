<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" rx="10" fill="#3f51b5" opacity="0.1"/>
  
  <!-- Certificate -->
  <rect x="25" y="30" width="70" height="50" rx="2" fill="#ffffff" stroke="#3f51b5" stroke-width="2"/>
  
  <!-- Certificate Content -->
  <g fill="#3f51b5">
    <!-- Title -->
    <rect x="35" y="35" width="50" height="5" rx="1" opacity="0.7"/>
    
    <!-- Content Lines -->
    <rect x="35" y="45" width="50" height="2" rx="1" opacity="0.5"/>
    <rect x="35" y="50" width="50" height="2" rx="1" opacity="0.5"/>
    <rect x="35" y="55" width="40" height="2" rx="1" opacity="0.5"/>
    
    <!-- Signature Line -->
    <line x1="40" y1="65" x2="70" y2="65" stroke="#3f51b5" stroke-width="1" opacity="0.7"/>
    <rect x="45" y="68" width="20" height="2" rx="1" opacity="0.5"/>
  </g>
  
  <!-- Seal -->
  <g transform="translate(75, 65)">
    <circle cx="0" cy="0" r="10" fill="#3f51b5" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M-5,-5 L5,5 M-5,5 L5,-5" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Ribbon -->
  <path d="M75,75 L85,85 L75,95 L65,85 Z" fill="#3f51b5"/>
  
  <!-- Blockchain Elements -->
  <g fill="#3f51b5">
    <!-- Blocks -->
    <rect x="30" y="90" width="10" height="10" rx="2" opacity="0.8"/>
    <rect x="45" y="90" width="10" height="10" rx="2" opacity="0.8"/>
    <rect x="60" y="90" width="10" height="10" rx="2" opacity="0.8"/>
    <rect x="75" y="90" width="10" height="10" rx="2" opacity="0.8"/>
    
    <!-- Connections -->
    <line x1="40" y1="95" x2="45" y2="95" stroke="#3f51b5" stroke-width="2"/>
    <line x1="55" y1="95" x2="60" y2="95" stroke="#3f51b5" stroke-width="2"/>
    <line x1="70" y1="95" x2="75" y2="95" stroke="#3f51b5" stroke-width="2"/>
  </g>
  
  <!-- Verification Symbol -->
  <g transform="translate(35, 20)">
    <circle cx="0" cy="0" r="8" fill="#3f51b5"/>
    <path d="M-3,0 L-1,2 L3,-2" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Medical Symbol -->
  <g fill="#3f51b5">
    <rect x="57.5" y="15" width="5" height="10" rx="1"/>
    <rect x="55" y="17.5" width="10" height="5" rx="1"/>
  </g>
</svg>
